# =========================================================
# Nginx — completohosting.lat
# Reverse proxy para Fastify backend + frontend estático
# =========================================================

server {
    listen 80;
    server_name completohosting.lat www.completohosting.lat;

    # Cloudflare maneja SSL — Nginx solo necesita escuchar en 80
    # (Cloudflare termina TLS y habla HTTP con el servidor)

    # ── Frontend estático (build de Vite) ────────────────
    root /opt/completo-hosting/frontend/dist;
    index index.html;

    # SPA fallback — todas las rutas van a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API REST ──────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts para descargas de JARs (pueden tardar)
        proxy_connect_timeout  60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }

    # ── WebSockets (consola Minecraft) ───────────────────
    location /api/minecraft/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # Headers críticos para WS
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s;  # 1 hora — conexión WS larga
    }

    # ── SSE (progreso de descarga de JARs) ───────────────
    location /api/minecraft/download-progress {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header Connection "";  # SSE requiere Connection vacío
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

        proxy_buffering    off;           # SSE requiere sin buffer
        proxy_cache        off;
        proxy_read_timeout 600s;
    }

    # ── WebSockets métricas ───────────────────────────────
    location /api/metrics/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

        proxy_read_timeout 3600s;
    }

    # ── Seguridad básica ──────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "no-referrer"  always;

    # Oculta versión de Nginx
    server_tokens off;

    # Límite de tamaño para uploads de JARs (500MB)
    client_max_body_size 500M;
}
